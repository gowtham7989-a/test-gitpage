<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETL Pipeline Architecture Overview</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            text-align: center;
            padding: 2rem;
            line-height: 1.6;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: #2a6f97;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 2rem;
        }
        .gallery {
            margin-top: 2rem;
            margin-bottom: 2.5rem;
        }
        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .explanation {
            text-align: left;
            padding-top: 1rem;
            border-top: 2px solid #e1e8ed;
        }
        .explanation h2 {
            color: #2a6f97;
            margin-top: 1.5rem;
        }
        .step {
            margin-bottom: 1rem;
        }
        .step-title {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <h1>My Photo Gallery</h1>
    <p>Hosted on GitHub Pages</p>

    <div class="gallery">
        <img src="assets/images/its-working-oyy433.jpg" alt="Glad! it worked">
    </div>

</body>
</html>
